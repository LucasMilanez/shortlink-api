services:
  api:
    build: .
    container_name: shortlink-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////data/app.db
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-me-generate-with-openssl-rand-hex-32}
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    volumes:
      - ./data:/data
    restart: unless-stopped
